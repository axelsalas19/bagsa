<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Geoportal - BAGSA</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" 
          crossorigin=""/>
    
    <!-- Estilos propios -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Botón para móvil -->
    <button id="mobileToggleBtn">☰</button>
    
    <div id="sidebar">
        <h2>Geoportal BAGSA</h2>
        
        <div id="status"></div>
        
        <button id="loadDataBtn">Cargar Datos Base</button>
        
        <!-- Filtro por Unidad Regional -->
        <div class="filter-section">
            <h3>Filtrar por Unidad Regional</h3>
            <select id="selectUnidadRegional" disabled>
                <option value="">-- Seleccione Unidad Regional --</option>
            </select>
            <div class="debug-info" id="unidadRegionalDebug"></div>
            <button class="filter-btn" id="applyUnidadRegionalFilter" disabled>Aplicar</button>
            <button class="filter-btn clear" id="clearUnidadRegionalFilter" disabled>Limpiar</button>
        </div>

        <!-- Lista de localidades de la unidad regional -->
        <div id="localidadesURContainer" style="display:none;">
            <h3>Áreas de Servicio de la Unidad Regional</h3>
            <div id="localidadesURList"></div>
        </div>
        
        <!-- Filtro por Localidad -->
        <div class="filter-section">
            <h3>Filtrar por Área de Servicio</h3>
            <select id="selectLocalidad" disabled>
                <option value="">-- Seleccione un Área de Servicio --</option>
            </select>
            <button class="filter-btn" id="applyLocalidadFilter" disabled>Aplicar</button>
            <button class="filter-btn clear" id="clearLocalidadFilter" disabled>Limpiar</button>
        </div>
        
        <!-- El panel de ruteo se insertará dinámicamente aquí -->
        
        <h3>Capas Disponibles</h3>
        
        <div class="layer-item">
            <label>
                <input type="checkbox" id="layer-municipios" data-table="municipios">
                Municipios
            </label>
        </div>
        
        <div class="layer-item">
            <label>
                <input type="checkbox" id="layer-localidades" data-table="localidades">
                Áreas de Servicio
            </label>
        </div>
        
        <div class="layer-item">
            <label id="label-red_de_gas">
                <input type="checkbox" id="layer-red_de_gas" data-table="red_de_gas" disabled>
                Red de Gas (requiere filtro)
            </label>
        </div>
        
        <div class="layer-item">
            <label id="label-calles">
                <input type="checkbox" id="layer-calles" data-table="calles" disabled>
                Calles (requiere filtro)
            </label>
        </div>

        <div class="layer-item">
            <label id="label-suministros">
                <input type="checkbox" id="layer-suministros" data-table="suministros" disabled>
                Suministros (requiere filtro)
            </label>
        </div>
    </div>
    
    <!-- Botón búsqueda -->
    <button id="toggleSearchBtn" title="Buscar suministro">🔍 Buscar</button>

    <!-- Panel de búsqueda -->
    <div id="searchPanel">
        <div id="searchPanelHeader">
            <span>Buscar Suministro</span>
            <button id="closeSearchBtn">✕</button>
        </div>
        <div id="searchPanelBody">
            <select id="searchField">
                <option value="Nombre">Por Nombre</option>
                <option value="medidor">Por Medidor</option>
                <option value="Cliente">Por Cliente</option>
            </select>
            <input type="text" id="searchInput" placeholder="Ingrese texto a buscar...">
            <button id="searchBtn">Buscar</button>
            <div id="searchResults"></div>
        </div>
    </div>

    <div id="map">
        <button id="toggleLegendBtn" style="display: none;">Diámetros de cañería</button>
    </div>
    
    <div id="legend">
        <h4>Diámetros de Red de Gas</h4>
        <div class="legend-item">
            <div class="legend-color diameter-50"></div>
            <div class="legend-label">Ø 50 mm</div>
        </div>
        <div class="legend-item">
            <div class="legend-color diameter-63"></div>
            <div class="legend-label">Ø 63 mm</div>
        </div>
        <div class="legend-item">
            <div class="legend-color diameter-90"></div>
            <div class="legend-label">Ø 90 mm</div>
        </div>
        <div class="legend-item">
            <div class="legend-color diameter-125"></div>
            <div class="legend-label">Ø 125 mm</div>
        </div>
        <div class="legend-item">
            <div class="legend-color diameter-180"></div>
            <div class="legend-label">Ø 180 mm</div>
        </div>
        <div class="legend-item">
            <div class="legend-color diameter-other"></div>
            <div class="legend-label">Otros diámetros</div>
        </div>
    </div>
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
    
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- WKT Parser -->
    <script src="https://unpkg.com/wicket@1.3.8/wicket.js"></script>
    
    <!-- Script principal -->
    <script src="script.js"></script>
</body>
</html>
