<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geoportal - Supabase</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" 
          crossorigin=""/>
    
    <!-- Estilos propios -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="sidebar">
        <h2>Geoportal - Bagsa 2026</h2>
        
        <div id="status"></div>
        
        <button id="checkTablesBtn">Verificar Tablas</button>
        <button id="loadDataBtn">Cargar Datos Base</button>
        
        <!-- Filtro por Municipio -->
        <div class="filter-section">
            <h3>Filtrar por Municipio</h3>
            <select id="selectMunicipio" disabled>
                <option value="">-- Seleccione un municipio --</option>
            </select>
            <div class="debug-info" id="municipioDebug"></div>
            <button class="filter-btn" id="applyMunicipioFilter" disabled>Aplicar</button>
            <button class="filter-btn clear" id="clearMunicipioFilter" disabled>Limpiar</button>
        </div>
        
        <!-- Filtro por Localidad -->
        <div class="filter-section">
            <h3>Filtrar por Localidad</h3>
            <select id="selectLocalidad" disabled>
                <option value="">-- Seleccione una localidad --</option>
            </select>
            <div class="debug-info" id="localidadDebug"></div>
            <button class="filter-btn" id="applyLocalidadFilter" disabled>Aplicar</button>
            <button class="filter-btn clear" id="clearLocalidadFilter" disabled>Limpiar</button>
        </div>
        
        <h3>Capas Disponibles</h3>
        
        <div class="layer-item">
            <label>
                <input type="checkbox" id="layer-municipios" data-table="municipios" checked>
                Municipios
            </label>
        </div>
        
        <div class="layer-item">
            <label>
                <input type="checkbox" id="layer-localidades" data-table="localidades" checked>
                Localidades
            </label>
        </div>
        
        <div class="layer-item">
            <label id="label-red_de_gas">
                <input type="checkbox" id="layer-red_de_gas" data-table="red_de_gas" disabled>
                Red de Gas (requiere filtro)
            </label>
        </div>
        
        <div class="layer-item">
            <label id="label-calles">
                <input type="checkbox" id="layer-calles" data-table="calles" disabled>
                Calles (requiere filtro)
            </label>
        </div>
        
        <h3>Elementos Cargados</h3>
        <div id="elementList"></div>
    </div>
    
    <div id="map"><button id="toggleLegendBtn" style="display: none;">Mostrar Leyenda</button></div>
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
    
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- WKT Parser -->
    <script src="https://unpkg.com/wicket@1.3.8/wicket.js"></script>
    
    <!-- Script principal -->
    <script src="script.js"></script>
    <!-- index.html - Agregar antes del cierre de </body> -->


<div id="legend">
    <h4>Diámetros de Red de Gas</h4>
    <div class="legend-item">
        <div class="legend-color diameter-50"></div>
        <div class="legend-label">Ø 50 mm</div>
    </div>
    <div class="legend-item">
        <div class="legend-color diameter-63"></div>
        <div class="legend-label">Ø 63 mm</div>
    </div>
    <div class="legend-item">
        <div class="legend-color diameter-90"></div>
        <div class="legend-label">Ø 90 mm</div>
    </div>
    <div class="legend-item">
        <div class="legend-color diameter-125"></div>
        <div class="legend-label">Ø 125 mm</div>
    </div>
    <div class="legend-item">
        <div class="legend-color diameter-180"></div>
        <div class="legend-label">Ø 180 mm</div>
    </div>
    <div class="legend-item">
        <div class="legend-color diameter-other"></div>
        <div class="legend-label">Otros diámetros</div>
    </div>
</div>
</body>
</html>
